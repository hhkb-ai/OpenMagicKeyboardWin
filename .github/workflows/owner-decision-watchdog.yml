name: Owner Decision Watchdog

on:
  schedule:
    - cron: '*/30 * * * *'
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  GH_REPO: ${{ github.repository }}

jobs:
  check-owner-decision:
    runs-on: ubuntu-latest
    steps:
      - name: Check for PRs needing Owner Decision
        id: check_pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRS=$(gh pr list --repo "$GH_REPO" --state open --limit 100 --json number,labels --jq '[.[] | select((.labels | map(.name) | contains(["approved-by-agent-c"])) and (.labels | map(.name) | contains(["approved-by-orchestrator"])) and (.labels | map(.name) | contains(["state:owner-decision"])) and (.labels | map(.name) | contains(["owner-decision-notified"]) | not))] | .[].number')
          if [ -z "$PRS" ]; then
            echo "found_pr=false" >> $GITHUB_OUTPUT
          else
            echo "found_pr=true" >> $GITHUB_OUTPUT
            echo "pr_numbers<<EOF" >> $GITHUB_OUTPUT
            echo "$PRS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Notify Owner for PRs
        if: steps.check_pr.outputs.found_pr == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRS: ${{ steps.check_pr.outputs.pr_numbers }}
        run: |
          echo "$PRS" | while read -r PR; do
            if [ -z "$PR" ]; then continue; fi
            gh pr edit "$PR" --repo "$GH_REPO" --add-label "owner-decision-notified" 2>/dev/null || true
            gh pr comment "$PR" --repo "$GH_REPO" --body "Owner Decision Required: this PR is waiting for Owner review and merge approval."
          done