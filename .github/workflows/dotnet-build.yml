name: dotnet-build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build shared and tools
        run: |
          dotnet build src/OpenMagicKeyboard.Shared/OpenMagicKeyboard.Shared.csproj -c Release
          dotnet build tools/A2450HidLogger/A2450HidLogger.csproj -c Release
          dotnet build tools/A2450DescriptorDump/A2450DescriptorDump.csproj -c Release
          dotnet build tools/A2450ConsumerControlProbe/A2450ConsumerControlProbe.csproj -c Release
          dotnet build src/OpenMagicKeyboard.App/OpenMagicKeyboard.App.csproj -c Release
      - name: Run transform tests
        run: |
          dotnet test tests/OpenMagicKeyboard.TransformTests/OpenMagicKeyboard.TransformTests.csproj -c Release
      - name: Run simulated logger
        run: |
          dotnet run --project tools/A2450HidLogger/A2450HidLogger.csproj -- --simulate
          if (!(Test-Path logs/device-snapshot.simulated.json)) { throw "missing simulated device snapshot" }
          if (!(Test-Path logs/a2450-key-events.simulated.jsonl)) { throw "missing simulated key events" }
      - name: Run simulated descriptor dump
        run: |
          dotnet run --project tools/A2450DescriptorDump/A2450DescriptorDump.csproj -- --simulate
          if (!(Test-Path logs/a2450-descriptor-dump.simulated.json)) { throw "missing simulated descriptor dump" }
      - name: Run simulated consumer control probe
        run: |
          dotnet run --project tools/A2450ConsumerControlProbe/A2450ConsumerControlProbe.csproj -- --simulate
          if (!(Test-Path logs/a2450-consumer-control-probe.simulated.json)) { throw "missing simulated consumer control probe" }
