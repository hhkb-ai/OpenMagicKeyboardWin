name: CI Hardening

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run unit tests
        run: |
          dotnet test tests/OpenMagicKeyboard.TransformTests/ \
            --verbosity normal \
            --logger "console;verbosity=detailed"

  wdk-build:
    name: WDK Build (${{ matrix.configuration }})
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build driver
        run: |
          msbuild driver/OpenMagicKeyboardA2450Filter/OpenMagicKeyboardA2450Filter.vcxproj `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /m `
            /verbosity:minimal

      - name: Verify .sys generated
        shell: bash
        run: |
          SYS_FILE="driver/OpenMagicKeyboardA2450Filter/bin/${{ matrix.configuration }}/${{ matrix.platform }}/OpenMagicKeyboardA2450Filter.sys"
          if [ ! -f "$SYS_FILE" ]; then
            echo "::error::.sys file not found: $SYS_FILE"
            exit 1
          fi
          echo "✅ .sys generated: $SYS_FILE"
          ls -la "$SYS_FILE"

      - name: Generate build evidence
        shell: bash
        run: |
          SYS_FILE="driver/OpenMagicKeyboardA2450Filter/bin/${{ matrix.configuration }}/${{ matrix.platform }}/OpenMagicKeyboardA2450Filter.sys"
          echo "## Build Evidence" > build-evidence.md
          echo "- Configuration: ${{ matrix.configuration }}" >> build-evidence.md
          echo "- Platform: ${{ matrix.platform }}" >> build-evidence.md
          echo "- .sys: $SYS_FILE" >> build-evidence.md
          echo "- Size: $(stat -c%s "$SYS_FILE" 2>/dev/null || echo 'N/A') bytes" >> build-evidence.md
          echo "- SHA256: $(sha256sum "$SYS_FILE" 2>/dev/null | cut -d' ' -f1 || echo 'N/A')" >> build-evidence.md

      - name: Upload build evidence
        uses: actions/upload-artifact@v4
        with:
          name: build-evidence-${{ matrix.configuration }}-${{ matrix.platform }}
          path: build-evidence.md

  forbidden-path-scan:
    name: Forbidden Path Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base ref for PR diff
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Scan for forbidden paths
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

            echo "Changed files:"
            echo "$CHANGED_FILES"
            echo ""

            # High-risk automation patterns - must FAIL, not warning
            HIGH_RISK_PATTERNS=(
              "bcdedit"
              "pnputil"
              "devcon"
              "sc create"
              "sc start"
              "Add-Driver"
              "/install"
              "testsigning"
              "HKLM\\\\SYSTEM"
              "LowerFilters"
            )

            echo "Scanning for high-risk runtime patterns in changed files..."
            FOUND_RISK=false
            for PATTERN in "${HIGH_RISK_PATTERNS[@]}"; do
              # Only scan changed files, exclude this workflow file to avoid self-detection
              MATCHES=$(echo "$CHANGED_FILES" | grep -E '\.(yml|yaml|sh|ps1|cmd|bat)$' | grep -v 'ci-hardening.yml' | xargs grep -l "$PATTERN" 2>/dev/null || true)
              if [ -n "$MATCHES" ]; then
                echo "::error::Found high-risk pattern '$PATTERN' in changed files:"
                echo "$MATCHES"
                FOUND_RISK=true
              fi
            done

            if [ "$FOUND_RISK" = true ]; then
              echo "::error::High-risk automation patterns detected. Failing scan."
              exit 1
            fi

            # Docs-only PR check: use explicit strategy based on changed files
            # If ALL changed files are under docs/, it's a docs-only PR
            NON_DOCS_FILES=$(echo "$CHANGED_FILES" | grep -v '^docs/' || true)
            if [ -z "$NON_DOCS_FILES" ] && [ -n "$CHANGED_FILES" ]; then
              echo "✅ Docs-only PR detected, no code files to check"
            elif echo "$CHANGED_FILES" | grep -qE '^(driver/|src/|tests/)'; then
              # Code files changed - verify they're in allowed paths
              echo "Code files changed, verifying..."
            fi
          fi

          echo "✅ Forbidden path scan passed"

  static-safety-scan:
    name: Static Safety Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for unsafe patterns in source files
        shell: bash
        run: |
          echo "Scanning for unsafe patterns in driver source files..."

          # Only scan .c and .h files, exclude .inf.template, docs, comments
          SOURCE_FILES=$(find driver/ -name "*.c" -o -name "*.h" 2>/dev/null)

          if [ -z "$SOURCE_FILES" ]; then
            echo "No source files found to scan"
            exit 0
          fi

          # Check driver code doesn't write Output Reports
          if echo "$SOURCE_FILES" | xargs grep -l "IOCTL_HID_WRITE_REPORT" 2>/dev/null; then
            echo "::error::Found IOCTL_HID_WRITE_REPORT in driver source code!"
            exit 1
          fi

          # Check driver code doesn't modify registry
          if echo "$SOURCE_FILES" | xargs grep -l "ZwSetValueKey\|ZwCreateKey" 2>/dev/null; then
            echo "::error::Found registry modification in driver source code!"
            exit 1
          fi

          # Check driver code doesn't call pnputil/devcon (runtime execution, not comments)
          if echo "$SOURCE_FILES" | xargs grep -l "system.*pnputil\|system.*devcon\|popen.*pnputil\|popen.*devcon" 2>/dev/null; then
            echo "::error::Found pnputil/devcon execution in driver source code!"
            exit 1
          fi

          echo "✅ Static safety scan passed"

  evidence-collection:
    name: Evidence Collection
    runs-on: ubuntu-latest
    needs: [unit-tests, wdk-build, forbidden-path-scan, static-safety-scan]
    if: always()
    steps:
      - name: Collect evidence
        shell: bash
        run: |
          echo "## CI Hardening Evidence" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- WDK Build: ${{ needs.wdk-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Forbidden Path Scan: ${{ needs.forbidden-path-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Static Safety Scan: ${{ needs.static-safety-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Safety Boundary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build/test/static-check only" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No runtime system-state actions" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No VM execution" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No hardware actions" >> $GITHUB_STEP_SUMMARY

          # Fail if any critical job failed
          if [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.wdk-build.result }}" = "failure" ] || \
             [ "${{ needs.forbidden-path-scan.result }}" = "failure" ] || \
             [ "${{ needs.static-safety-scan.result }}" = "failure" ]; then
            echo "::error::One or more critical jobs failed"
            exit 1
          fi
