name: CI Hardening

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run unit tests
        run: |
          dotnet test tests/OpenMagicKeyboard.TransformTests/ \
            --verbosity normal \
            --logger "console;verbosity=detailed"

  wdk-build:
    name: WDK Build (${{ matrix.configuration }})
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build driver
        run: |
          msbuild driver/OpenMagicKeyboardA2450Filter/OpenMagicKeyboardA2450Filter.vcxproj `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /m `
            /verbosity:minimal

      - name: Verify .sys generated
        shell: bash
        run: |
          SYS_FILE="driver/OpenMagicKeyboardA2450Filter/bin/${{ matrix.configuration }}/${{ matrix.platform }}/OpenMagicKeyboardA2450Filter.sys"
          if [ ! -f "$SYS_FILE" ]; then
            echo "::error::.sys file not found: $SYS_FILE"
            exit 1
          fi
          echo "✅ .sys generated: $SYS_FILE"
          ls -la "$SYS_FILE"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            driver/OpenMagicKeyboardA2450Filter/bin/${{ matrix.configuration }}/${{ matrix.platform }}/*.sys
            driver/OpenMagicKeyboardA2450Filter/bin/${{ matrix.configuration }}/${{ matrix.platform }}/*.pdb

  forbidden-path-scan:
    name: Forbidden Path Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for forbidden paths
        shell: bash
        run: |
          # Check if docs-only PR changes unexpected paths
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

            # Check for high-risk runtime patterns in automation files
            HIGH_RISK_PATTERNS=(
              "bcdedit"
              "pnputil"
              "devcon"
              "sc create"
              "sc start"
              "Add-Driver"
              "/install"
              "testsigning"
              "HKLM\\\\SYSTEM"
              "LowerFilters"
            )

            echo "Scanning for high-risk runtime patterns..."
            for PATTERN in "${HIGH_RISK_PATTERNS[@]}"; do
              if echo "$CHANGED_FILES" | grep -qE '\.(yml|yaml|sh|ps1|cmd|bat)$'; then
                MATCHES=$(grep -r "$PATTERN" .github/ scripts/ 2>/dev/null || true)
                if [ -n "$MATCHES" ]; then
                  echo "::warning::Found pattern '$PATTERN' in automation files:"
                  echo "$MATCHES"
                fi
              fi
            done

            # Verify docs-only PRs don't touch code
            if echo "$CHANGED_FILES" | grep -qE '^docs/'; then
              if echo "$CHANGED_FILES" | grep -qE '^(driver/|src/|tests/)'; then
                echo "::error::Docs-only PR touches code files!"
                exit 1
              fi
            fi
          fi

          echo "✅ Forbidden path scan passed"

  static-safety-scan:
    name: Static Safety Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for unsafe patterns
        shell: bash
        run: |
          echo "Scanning for unsafe patterns in driver code..."

          # Check driver code doesn't write Output Reports
          if grep -r "IOCTL_HID_WRITE_REPORT" driver/ 2>/dev/null; then
            echo "::error::Found IOCTL_HID_WRITE_REPORT in driver code!"
            exit 1
          fi

          # Check driver code doesn't modify registry
          if grep -r "ZwSetValueKey\|ZwCreateKey" driver/ 2>/dev/null; then
            echo "::error::Found registry modification in driver code!"
            exit 1
          fi

          # Check driver code doesn't call pnputil/devcon
          if grep -r "pnputil\|devcon" driver/ 2>/dev/null; then
            echo "::error::Found pnputil/devcon in driver code!"
            exit 1
          fi

          # Verify .inf.template is not executable
          if [ -f "driver/OpenMagicKeyboardA2450Filter/OpenMagicKeyboardA2450Filter.inf.template" ]; then
            if head -1 "driver/OpenMagicKeyboardA2450Filter/OpenMagicKeyboardA2450Filter.inf.template" | grep -q "^#!"; then
              echo "::error::.inf.template has shebang line!"
              exit 1
            fi
          fi

          echo "✅ Static safety scan passed"

  evidence-collection:
    name: Evidence Collection
    runs-on: ubuntu-latest
    needs: [unit-tests, forbidden-path-scan, static-safety-scan]
    if: always()
    steps:
      - name: Collect evidence
        shell: bash
        run: |
          echo "## CI Hardening Evidence" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- WDK Build: ${{ needs.wdk-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Forbidden Path Scan: ${{ needs.forbidden-path-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Static Safety Scan: ${{ needs.static-safety-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Safety Boundary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build/test/static-check only" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No runtime system-state actions" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No VM execution" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No hardware actions" >> $GITHUB_STEP_SUMMARY
